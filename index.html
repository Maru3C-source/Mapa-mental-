<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>イースター メキシコの場合 · Mapa</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #f0f2f5;
  --paper:  #ffffff;
  --navy:   #0f3460;
  --navy2:  #1a1a3e;
  --teal:   #4ecdc4;
  --gold:   #f5a623;
  --ink:    #111827;
  --ink2:   #4b5563;
  --ink3:   #9ca3af;
  --green:  #166534;
  --line:   rgba(15,52,96,0.12);
  --r:      14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, var(--navy2) 0%, var(--navy) 100%);
  padding: 20px 18px 18px;
  text-align: center;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid rgba(78,205,196,0.25);
}
header h1 {
  font-family: 'Kaisei Decol', serif;
  font-size: clamp(1rem, 4vw, 1.35rem);
  color: #fff; font-weight: 700; line-height: 1.3;
}
header p {
  font-size: .75rem; color: var(--gold);
  margin-top: 4px; font-weight: 600;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  padding: 10px 14px;
  background: rgba(15,52,96,0.96);
  position: sticky; top: 70px; z-index: 40;
  border-bottom: 1px solid rgba(78,205,196,0.15);
}
.tbtn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .7rem; font-weight: 700;
  border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: 99px; padding: 5px 13px;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75);
  cursor: pointer; transition: all .18s; -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.tbtn.on { background: rgba(78,205,196,0.28); color: var(--teal); border-color: rgba(78,205,196,0.5); }
.tbtn-save {
  background: rgba(26,122,74,0.3); border-color: rgba(78,205,196,0.4); color: var(--teal); font-weight: 800;
}
.tbtn-save.ok { background: rgba(26,122,74,0.7); color: #fff; }
.tbtn:active { opacity: .75; }

/* ── MAP CONTAINER ── */
.map {
  max-width: 680px; margin: 0 auto;
  padding: 20px 14px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}

/* ── CENTER NODE ── */
.node-center {
  width: 100%; max-width: 360px;
  background: linear-gradient(135deg, var(--navy2) 0%, var(--navy) 100%);
  border-radius: var(--r);
  padding: 18px 20px 16px;
  text-align: center;
  border: 1.5px solid rgba(245,166,35,0.35);
  box-shadow: 0 6px 28px rgba(15,52,96,0.22);
  position: relative; z-index: 2;
}
.node-center .icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
.node-center .jp   { font-family: 'Kaisei Decol', serif; font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.4; }
.node-center .rd   { font-size: .72rem; color: rgba(78,205,196,.8); margin-top: 3px; }
.node-center .es   { font-size: .82rem; color: var(--gold); font-weight: 700; margin-top: 6px; }

/* ── CONNECTOR ── */
.connector {
  width: 2px; height: 28px;
  background: linear-gradient(to bottom, rgba(15,52,96,0.25), rgba(15,52,96,0.1));
  flex-shrink: 0;
}
.connector-branch {
  width: 100%; display: flex; align-items: flex-start; justify-content: center;
  position: relative; margin: 0;
}
.connector-branch::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 2px; height: 28px;
  background: rgba(15,52,96,0.2);
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: .62rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink3); background: var(--bg);
  padding: 2px 10px; margin: 4px 0;
  border-radius: 99px; border: 1px solid var(--line);
  z-index: 1;
}

/* ── REGULAR NODE ── */
.node {
  width: 100%; max-width: 600px;
  background: var(--paper);
  border-radius: var(--r);
  border: 1.5px solid var(--line);
  box-shadow: 0 2px 12px rgba(15,52,96,0.07);
  overflow: hidden;
  break-inside: avoid;
  transition: box-shadow .18s;
}
.node:active { box-shadow: 0 4px 20px rgba(15,52,96,0.14); }

.node-head {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px 8px;
  border-bottom: 1px solid var(--line);
}
.node-head .icon { font-size: 1.1rem; line-height: 1; }
.node-head .cat  {
  font-size: .62rem; font-weight: 800; letter-spacing: .07em;
  text-transform: uppercase;
}
.node-head .edit-btn {
  margin-left: auto; width: 24px; height: 24px;
  border: 1px solid var(--line); border-radius: 6px;
  background: var(--bg); color: var(--ink2); font-size: .72rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}

.node-body { padding: 11px 14px 13px; }

.jp-main {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.1rem; font-weight: 700; color: var(--ink); line-height: 1.35;
}
.jp-read { font-size: .7rem; color: var(--ink3); margin-top: 2px; line-height: 1.5; }
.es-text {
  font-size: .78rem; color: var(--green); font-style: italic;
  margin-top: 7px; padding-top: 7px;
  border-top: 1px dashed rgba(15,52,96,0.12); line-height: 1.55;
  transition: opacity .2s, max-height .25s; max-height: 120px; overflow: hidden;
}
.es-text.hide { opacity: 0; max-height: 0; padding-top: 0; border-top: none; margin-top: 0; }
.jp-main.hide, .jp-read.hide { opacity: 0; transition: opacity .2s; }

.subs { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
.sub  {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 6px 8px; border-radius: 8px;
  break-inside: avoid;
}
.sub-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.sub-jp  { font-size: .82rem; font-weight: 700; color: var(--ink); line-height: 1.45; }
.sub-rd  { font-size: .65rem; color: var(--ink3); }
.sub-es  {
  font-size: .74rem; color: var(--green); font-style: italic; line-height: 1.4;
  transition: opacity .2s, max-height .2s; max-height: 60px; overflow: hidden;
}
.sub-es.hide { opacity: 0; max-height: 0; }

/* COLOR THEMES */
.t-gold   .node-head { background: #fdf4e3; } .t-gold   .cat { color: #9a6010; } .t-gold   .sub { background: #fdf4e3; } .t-gold   .sub-dot { background: #b8720e; }
.t-coral  .node-head { background: #fdf0ee; } .t-coral  .cat { color: #b83820; } .t-coral  .sub { background: #fdf0ee; } .t-coral  .sub-dot { background: #b83820; }
.t-orange .node-head { background: #fdf3e8; } .t-orange .cat { color: #9a4e10; } .t-orange .sub { background: #fdf3e8; } .t-orange .sub-dot { background: #c06020; }
.t-violet .node-head { background: #f0ecfc; } .t-violet .cat { color: #5030a0; } .t-violet .sub { background: #f0ecfc; } .t-violet .sub-dot { background: #6040b0; }
.t-blue   .node-head { background: #edf3fc; } .t-blue   .cat { color: #1a4f9a; } .t-blue   .sub { background: #edf3fc; } .t-blue   .sub-dot { background: #2563a8; }
.t-teal   .node-head { background: #e6f7f5; } .t-teal   .cat { color: #0e7a70; } .t-teal   .sub { background: #e6f7f5; } .t-teal   .sub-dot { background: #1a9a8e; }
.t-green  .node-head { background: #edf7f0; } .t-green  .cat { color: #145e38; } .t-green  .sub { background: #edf7f0; } .t-green  .sub-dot { background: #1a7a4a; }
.t-gray   .node-head { background: #f3f4f6; } .t-gray   .cat { color: #374151; } .t-gray   .sub { background: #f3f4f6; } .t-gray   .sub-dot { background: #6b7280; }
.t-rose   .node-head { background: #fceef4; } .t-rose   .cat { color: #8b1a50; } .t-rose   .sub { background: #fceef4; } .t-rose   .sub-dot { background: #a03060; }

/* ── MODAL ── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,52,96,0.5); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
@media (min-width: 500px) { #modal-overlay { align-items: center; } }
#modal-overlay.open { opacity: 1; pointer-events: all; }

#modal {
  background: var(--paper); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 20px 18px 32px;
  transform: translateY(20px); transition: transform .22s;
}
@media (min-width: 500px) {
  #modal { border-radius: 18px; width: min(480px, 94vw); max-height: 85vh; }
}
#modal-overlay.open #modal { transform: none; }

#modal h2 { font-family: 'Kaisei Decol', serif; font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 14px; }

.fg { margin-bottom: 10px; }
.fg label { display: block; font-size: .6rem; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; color: var(--ink3); margin-bottom: 4px; }
.fg input {
  width: 100%; font-family: 'Noto Sans JP', sans-serif; font-size: .9rem; color: var(--ink);
  background: var(--bg); border: 1.5px solid rgba(15,52,96,0.14); border-radius: 9px;
  padding: 9px 11px; outline: none; -webkit-appearance: none;
}
.fg input:focus { border-color: var(--navy); }
.two-col { display: grid; grid-template-columns: 72px 1fr; gap: 8px; }

.sub-lbl { display: grid; grid-template-columns: 1fr 1fr 1fr 28px; gap: 5px; margin-bottom: 4px; }
.sub-lbl span { font-size: .58rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--ink3); }
.sub-row { display: grid; grid-template-columns: 1fr 1fr 1fr 28px; gap: 5px; align-items: center; margin-bottom: 6px; }
.sub-row input { font-size: .8rem; padding: 7px 8px; }

.del-btn {
  width: 28px; height: 28px; background: #fdf0ee; border: 1px solid rgba(184,56,32,.2);
  border-radius: 7px; color: #b83820; font-size: .8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.add-sub {
  font-size: .72rem; color: #0e7a70; background: #e6f7f5;
  border: 1px dashed rgba(14,122,112,.3); border-radius: 7px;
  padding: 6px 12px; cursor: pointer; margin-top: 2px; width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.modal-hr { height: 1px; background: var(--line); margin: 12px 0; }
.modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.m-cancel {
  font-size: .78rem; padding: 9px 16px; border: 1.5px solid var(--line);
  border-radius: 99px; background: transparent; color: var(--ink2); cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.m-ok {
  font-size: .78rem; padding: 9px 20px; border: none; border-radius: 99px;
  background: var(--navy); color: #fff; cursor: pointer; font-weight: 700;
  -webkit-tap-highlight-color: transparent;
}

/* print */
@media print {
  .toolbar, #modal-overlay { display: none !important; }
  body { padding: 0; }
  .node { break-inside: avoid; }
}
</style>
</head>
<body>

<header>
  <h1>✝️ イースター　メキシコの<ruby>場合<rt>ばあい</rt></ruby></h1>
  <p>Semana Santa en México · Maru 3C · Nivel avanzado</p>
</header>

<div class="toolbar">
  <button class="tbtn on"   id="btn-jp" onclick="toggleLang('jp')">🇯🇵 日本語</button>
  <button class="tbtn on"   id="btn-es" onclick="toggleLang('es')">🇪🇸 Español</button>
  <button class="tbtn tbtn-save" id="btn-save" onclick="saveHTML()">💾 Guardar</button>
</div>

<div class="map" id="map-root"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <h2 id="modal-title">✎ Editar nodo</h2>
    <div class="two-col">
      <div class="fg"><label>Icono</label><input id="f-icon" maxlength="4"></div>
      <div class="fg"><label>Categoría</label><input id="f-cat"></div>
    </div>
    <div class="fg"><label>🇯🇵 Principal</label><input id="f-jp"></div>
    <div class="fg"><label>🇯🇵 Furigana</label><input id="f-rd"></div>
    <div class="fg"><label>🇪🇸 Traducción</label><input id="f-es"></div>
    <div class="modal-hr"></div>
    <div class="fg">
      <label>Sub-items</label>
      <div class="sub-lbl"><span>🇯🇵 Japonés</span><span>Furigana</span><span>🇪🇸 Español</span><span></span></div>
      <div id="sub-ed"></div>
      <button class="add-sub" onclick="addSubRow()">＋ Añadir sub-item</button>
    </div>
    <div class="modal-foot">
      <button class="m-cancel" onclick="closeModal()">Cancelar</button>
      <button class="m-ok"     onclick="applyEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const NODES = [
  {
    "id": "center",
    "theme": "center",
    "icon": "✝️",
    "cat": "テーマ中心",
    "jpMain": "イースター　メキシコの場合",
    "jpRead": "メキシコのイースター",
    "es": "Semana Santa en México",
    "subs": []
  },
  {
    "id": "retiro",
    "theme": "t-gold",
    "icon": "🙏",
    "cat": "§1·2　リトリート · Retiro espiritual",
    "jpMain": "修行（リトリート）",
    "jpRead": "しゅぎょう",
    "es": "Retiro espiritual para encontrar a Dios",
    "subs": [
      { "jp": "12〜18歳の若者たち", "rd": "わかものたち", "es": "Jóvenes de 12 a 18 años" },
      { "jp": "4月ごろ · イースターの時期", "rd": "しがつ じき", "es": "Alrededor de abril, época de Pascua" },
      { "jp": "2泊3日", "rd": "にはくみっか", "es": "Dos noches, tres días" },
      { "jp": "学校の中庭で過ごす", "rd": "がっこうのなかにわ すごす", "es": "Se quedan en el patio del colegio" }
    ]
  },
  {
    "id": "viacrucis",
    "theme": "t-coral",
    "icon": "⛪",
    "cat": "§2·6　十字架の道行 · Vía Crucis",
    "jpMain": "十字架の道行",
    "jpRead": "じゅうじかのみちゆき",
    "es": "Vía Crucis — recreado en el patio del colegio",
    "subs": [
      { "jp": "再現する", "rd": "さいげんする", "es": "Recrear / representar" },
      { "jp": "イエスが13回崩れ落ちた場面も", "rd": "くずれおちた ばめん", "es": "También la escena en que Jesús cae 13 veces" }
    ]
  },
  {
    "id": "keiko",
    "theme": "t-orange",
    "icon": "🔥",
    "cat": "§3·4　からだの苦行 · Penitencia corporal",
    "jpMain": "からだの修行",
    "jpRead": "からだのしゅぎょう",
    "es": "Penitencia corporal — caminar descalzo",
    "subs": [
      { "jp": "シャツ・靴・靴下を脱ぐ", "rd": "ぬぐ", "es": "Quitarse camisa, zapatos y calcetines" },
      { "jp": "ズボンの裾を捲り上げる", "rd": "まくりあげる", "es": "Arremangar el pantalón" },
      { "jp": "地面が焼けるほど熱くても", "rd": "じめん やける あつい", "es": "Aunque el suelo esté hirviendo" },
      { "jp": "校庭をそのまま歩き回る", "rd": "こうていをあるきまわる", "es": "Caminar por el patio tal como están" }
    ]
  },
  {
    "id": "imi",
    "theme": "t-violet",
    "icon": "💭",
    "cat": "§5　意味・目的 · Significado",
    "jpMain": "体験する意味",
    "jpRead": "たいけんするいみ",
    "es": "¿Por qué lo hacen?",
    "subs": [
      { "jp": "イエスが磔にされるまでに味わった苦しみ", "rd": "はりつけ くるしみ", "es": "El sufrimiento de Jesús antes de ser crucificado" },
      { "jp": "自分たちも体験するため", "rd": "じぶんたち たいけん", "es": "Para vivirlo ellos mismos en carne propia" }
    ]
  },
  {
    "id": "rosario",
    "theme": "t-blue",
    "icon": "📿",
    "cat": "§7　ロザリオの祈り · Rosario",
    "jpMain": "ロザリオの祈り",
    "jpRead": "ロザリオのいのり",
    "es": "Rezo del rosario en el suelo",
    "subs": [
      { "jp": "熱い地面にうつ伏せになる", "rd": "じめん うつぶせ", "es": "Acostarse boca abajo en el suelo caliente" },
      { "jp": "倒れる度に立ち止まる", "rd": "たおれるたびに", "es": "Detenerse cada vez que caen" },
      { "jp": "数分間ロザリオの祈りを捧げる", "rd": "すうふんかん ささげる", "es": "Rezar el rosario durante varios minutos" }
    ]
  },
  {
    "id": "testimony",
    "theme": "t-teal",
    "icon": "🗣",
    "cat": "§8　個人の証言 · Testimonio",
    "jpMain": "私の体験談",
    "jpRead": "わたしのたいけんだん",
    "es": "Testimonio personal de la narradora",
    "subs": [
      { "jp": "罰みたいに聞こえるけど…", "rd": "ばつ きこえる", "es": "Puede sonar como un castigo, pero…" },
      { "jp": "中学の頃の反抗期だった私", "rd": "ちゅうがく はんこうき", "es": "Yo, en plena rebeldía de la secundaria" },
      { "jp": "ガチでためになった", "rd": "", "es": "De verdad me sirvió muchísimo" }
    ]
  },
  {
    "id": "lent",
    "theme": "t-green",
    "icon": "📅",
    "cat": "§9·11　レント（四旬節）· Cuaresma",
    "jpMain": "レント（四旬節）",
    "jpRead": "しじゅんせつ",
    "es": "Cuaresma — 40 días de penitencia",
    "subs": [
      { "jp": "40日間の断食", "rd": "だんじき", "es": "Ayuno de 40 días" },
      { "jp": "金曜日にご飯を抜いたり", "rd": "きんようび ぬく", "es": "Los viernes saltarse alguna comida" },
      { "jp": "肉を食べなかったりする", "rd": "にく たべない", "es": "O no comer carne" }
    ]
  },
  {
    "id": "ceniza",
    "theme": "t-gray",
    "icon": "🕯️",
    "cat": "§10　灰の水曜日 · Miércoles de Ceniza",
    "jpMain": "灰の水曜日",
    "jpRead": "はいのすいようび",
    "es": "Miércoles de Ceniza",
    "subs": [
      { "jp": "ほとんどの人がミサに行く", "rd": "みさ", "es": "La mayoría de las personas van a misa" }
    ]
  },
  {
    "id": "finale",
    "theme": "t-rose",
    "icon": "🌅",
    "cat": "§12　クライマックス · Clímax",
    "jpMain": "聖金曜日 → イースターの日曜日",
    "jpRead": "せいきんようび → にちようび",
    "es": "Viernes Santo → Domingo de Pascua",
    "subs": [
      { "jp": "イエスが復活したのを祝う", "rd": "ふっかつ いわう", "es": "Celebrar la resurrección de Jesús" },
      { "jp": "イースターの日曜日のミサまで続く", "rd": "つづく", "es": "Todo continúa hasta la misa del Domingo de Pascua" }
    ]
  }
];

// ── STATE ──────────────────────────────────────────────────────────
let showJP = true, showES = true, editingId = null;

// ── BUILD DOM ──────────────────────────────────────────────────────
function nodeHTML(n) {
  if (n.id === 'center') {
    return `<div class="node-center">
      <span class="icon">${n.icon}</span>
      <div class="jp jp-item${showJP?'':' hide'}">${n.jpMain}</div>
      <div class="rd jp-item${showJP?'':' hide'}">${n.jpRead}</div>
      <div class="es es-item${showES?'':' hide'}">${n.es}</div>
    </div>`;
  }
  const subs = (n.subs||[]).map(s => `
    <div class="sub">
      <div class="sub-dot"></div>
      <div>
        <div class="sub-jp jp-item${showJP?'':' hide'}">${s.jp}${s.rd?' <span class="sub-rd">'+s.rd+'</span>':''}</div>
        <div class="sub-es es-item${showES?'':' hide'}">${s.es}</div>
      </div>
    </div>`).join('');
  return `<div class="node ${n.theme}" id="nd-${n.id}">
    <div class="node-head">
      <span class="icon">${n.icon}</span>
      <span class="cat">${n.cat}</span>
      <button class="edit-btn" onclick="openModal('${n.id}')">✎</button>
    </div>
    <div class="node-body">
      <div class="jp-main jp-item${showJP?'':' hide'}">${n.jpMain}</div>
      <div class="jp-read jp-item${showJP?'':' hide'}">${n.jpRead}</div>
      ${n.es?`<div class="es-text es-item${showES?'':' hide'}">${n.es}</div>`:''}
      ${n.subs&&n.subs.length?`<div class="subs">${subs}</div>`:''}
    </div>
  </div>`;
}

function buildMap() {
  const root = document.getElementById('map-root');
  root.innerHTML = '';

  // Center node
  root.insertAdjacentHTML('beforeend', nodeHTML(NODES[0]));
  root.insertAdjacentHTML('beforeend', '<div class="connector"></div>');

  // Rest of nodes with connectors
  NODES.slice(1).forEach((n, i) => {
    root.insertAdjacentHTML('beforeend', nodeHTML(n));
    if (i < NODES.length - 2) {
      root.insertAdjacentHTML('beforeend', '<div class="connector"></div>');
    }
  });
}

buildMap();

// ── LANGUAGE TOGGLE ────────────────────────────────────────────────
function toggleLang(lang) {
  if (lang === 'jp') {
    showJP = !showJP;
    document.getElementById('btn-jp').classList.toggle('on', showJP);
    document.querySelectorAll('.jp-item').forEach(el => el.classList.toggle('hide', !showJP));
  } else {
    showES = !showES;
    document.getElementById('btn-es').classList.toggle('on', showES);
    document.querySelectorAll('.es-item').forEach(el => el.classList.toggle('hide', !showES));
  }
}

// ── EDIT MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  editingId = id;
  const n = NODES.find(x => x.id === id);
  document.getElementById('modal-title').textContent = '✎ ' + n.jpMain;
  document.getElementById('f-icon').value = n.icon   || '';
  document.getElementById('f-cat').value  = n.cat    || '';
  document.getElementById('f-jp').value   = n.jpMain || '';
  document.getElementById('f-rd').value   = n.jpRead || '';
  document.getElementById('f-es').value   = n.es     || '';
  const ed = document.getElementById('sub-ed');
  ed.innerHTML = '';
  (n.subs||[]).forEach(s => addSubRow(s));
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-jp').focus(), 80);
}
function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}
function addSubRow(s) {
  s = s || {jp:'', rd:'', es:''};
  const r = document.createElement('div');
  r.className = 'sub-row';
  r.innerHTML = `
    <input type="text" placeholder="日本語" value="${s.jp||''}" data-f="jp">
    <input type="text" placeholder="よみ"   value="${s.rd||''}" data-f="rd">
    <input type="text" placeholder="ES"     value="${s.es||''}" data-f="es">
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('sub-ed').appendChild(r);
}
function applyEdit() {
  const n = NODES.find(x => x.id === editingId);
  if (!n) return;
  n.icon   = document.getElementById('f-icon').value.trim() || n.icon;
  n.cat    = document.getElementById('f-cat').value.trim()  || n.cat;
  n.jpMain = document.getElementById('f-jp').value.trim()   || n.jpMain;
  n.jpRead = document.getElementById('f-rd').value.trim();
  n.es     = document.getElementById('f-es').value.trim();
  n.subs   = [];
  document.querySelectorAll('#sub-ed .sub-row').forEach(r => {
    const jp = r.querySelector('[data-f="jp"]').value.trim();
    const rd = r.querySelector('[data-f="rd"]').value.trim();
    const es = r.querySelector('[data-f="es"]').value.trim();
    if (jp || es) n.subs.push({jp, rd, es});
  });
  // Rebuild only the changed node
  const el = document.getElementById('nd-' + n.id);
  if (el) el.outerHTML = nodeHTML(n);
  closeModal();
}

// ── SAVE HTML ──────────────────────────────────────────────────────
function saveHTML() {
  const src     = document.documentElement.outerHTML;
  const newData = 'const NODES = ' + JSON.stringify(NODES, null, 2) + ';';
  const updated = src.replace(/const NODES = \[[\s\S]*?\];/, newData);
  const blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'mapa_semana_santa_mexico.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  const btn = document.getElementById('btn-save');
  btn.textContent = '✓ ¡Guardado!'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '💾 Guardar'; btn.classList.remove('ok'); }, 2500);
}
</script>
</body>
